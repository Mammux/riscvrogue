# Default build target for the workspace: bare-metal RISC-V 64-bit.
#
# The `game` crate is `no_std` but architecture-independent; it builds
# fine for this target as well, which keeps `cargo build` from the
# workspace root working out of the box.
[build]
target = "riscv64gc-unknown-none-elf"

# Linker and runner configuration for the kernel.
#
# - `-C link-arg=-Tkernel/linker.ld` tells the linker to use our custom
#   linker script that matches the QEMU `virt` machine's memory map.
# - `runner` lets `cargo run -p kernel` launch QEMU directly.
[target.riscv64gc-unknown-none-elf]
rustflags = [
    "-C", "link-arg=-Tkernel/linker.ld",
    "-C", "force-frame-pointers=yes",
]
#
# Notes on the runner:
#
# - We now run with a graphical display and VirtIO GPU/input devices.
# - The game renders into a framebuffer (virtio-gpu) and reads keys
#   from virtio-input. SBI UART is retained only for debug output.
# - Stdio remains attached to the QEMU monitor + serial mux so we can
#   still use `Ctrl-A x` to quit from terminal sessions.
#
runner = [
    "qemu-system-riscv64",
    "-machine", "virt",
    "-cpu", "rv64",
    "-smp", "1",
    "-m", "128M",
    "-bios", "default",
    "-device", "virtio-gpu-device",
    "-device", "virtio-keyboard-device",
    "-chardev", "stdio,id=char0,mux=on,signal=off",
    "-serial", "chardev:char0",
    "-mon", "chardev=char0,mode=readline",
    "-kernel",
]

# Unstable features used by the kernel build.
# `build-std` lets us rebuild `core`/`alloc` with our panic strategy.
[unstable]
build-std = ["core", "compiler_builtins", "alloc"]
build-std-features = ["compiler-builtins-mem"]
